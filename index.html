		<script type="text/javascript">
			$(document).ready(function() {
				$('body').css('display', 'none');

				$('.link').click(function() {
					event.preventDefault();
					newLocation = this.href;

					$('body').fadeOut(1000, newpage);
				});
				function newpage() {
					window.location = newLocation;
				}
				$("a").on('click', function(event) {
    				if (this.hash !== "") {
      					event.preventDefault();

      					var hash = this.hash;

      					$('html, body').animate({
        					scrollTop: $(hash).offset().top
      					}, 650, function(){
        					window.location.hash = hash;
      					});
    				}
  				});
			});
			$(function() {
				var header = $("header");

				$(window).scroll(function() {    
					var scroll = $(window).scrollTop();
					if (scroll >= 50) {
						header.addClass("scrolled");
					} else {
						header.removeClass("scrolled");
					}
				});	
			});

								<p id="myWork" class="tagline"><em><span class="static-part">KM Makes </span></em><span id="rotating-word" class="rotating-word"></span><span id="cursor" class="cursor">

								

								<script>

									const words = ["experiences with impact.", "ideas come to life.", "products that matter.", "things that don't suck.", "a lot of cool sh*t, actually."];



									const el = document.getElementById('rotating-word');

									const cursor = document.getElementById('cursor');



									let wordIndex = 0;

									let charIndex = 0;

									let isDeleting = false;



									function tick() {

									  const current = words[wordIndex];

									  isDeleting ? charIndex-- : charIndex++;

									  el.textContent = current.slice(0, charIndex);



									  let delay = isDeleting ? 25 : 45; // delete faster than type



									  if (!isDeleting && charIndex === current.length) {

									    delay = 1600;       // pause at the end

									    isDeleting = true;

									  } else if (isDeleting && charIndex === 0) {

									    isDeleting = false;

									    wordIndex = (wordIndex + 1) % words.length; // next word, looping

									    delay = 300;

									  } else {

									    cursor.style.animationPlayState = 'paused';

									    cursor.style.opacity = '1';

									  }



									  setTimeout(tick, delay);

									}

									tick();

								</script>

				<script>

					const canvas = document.getElementById('particle-canvas');

					const ctx = canvas.getContext('2d');

					const container = document.getElementById('comingSoon');



					function resize() {

					  canvas.width = window.innerWidth;

					  canvas.height = window.innerHeight;

					}

					resize();

					window.addEventListener('resize', resize);



					const COLORS = ['#B282C5', '#C99AD8', '#9A6AAF', '#D4AAEB', '#7E5499', '#E2C4F0'];



					class Particle {

					  constructor() { this.reset(true); }

					  reset(initial) {

					    this.x = Math.random() * canvas.width;

					    this.y = initial ? Math.random() * canvas.height : canvas.height + 10;

					    this.r = Math.random() * 3.2 + 0.5;

					    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];

					    this.alpha = Math.random() * 0.6 + 0.15;

					    this.speedY = -(Math.random() * 0.4 + 0.1);

					    this.speedX = (Math.random() - 0.5) * 0.25;

					    this.drift = Math.random() * Math.PI * 2;

					    this.driftSpeed = (Math.random() * 0.008 + 0.003);

					    this.driftAmp = Math.random() * 0.6 + 0.2;

					    this.pulsePhase = Math.random() * Math.PI * 2;

					    this.pulseSpeed = Math.random() * 0.02 + 0.008;

					  }

					  update() {

					    this.drift += this.driftSpeed;

					    this.pulsePhase += this.pulseSpeed;

					    this.x += this.speedX + Math.sin(this.drift) * this.driftAmp;

					    this.y += this.speedY;

					    this.currentAlpha = this.alpha * (0.7 + 0.3 * Math.sin(this.pulsePhase));

					    if (this.y < -10) this.reset(false);

					  }

					  draw() {

					    ctx.save();

					    ctx.globalAlpha = this.currentAlpha;

					    ctx.beginPath();

					    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);

					    ctx.fillStyle = this.color;

					    ctx.fill();

					    ctx.restore();

					  }

					}



					class ConnectionLine {

					  constructor() { this.reset(); }

					  reset() {

					    this.x = Math.random() * canvas.width;

					    this.y = Math.random() * canvas.height;

					    this.targetX = this.x + (Math.random() - 0.5) * 120;

					    this.targetY = this.y + (Math.random() - 0.5) * 120;

					    this.progress = 0;

					    this.speed = Math.random() * 0.004 + 0.002;

					    this.maxAlpha = Math.random() * 0.12 + 0.03;

					    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];

					    this.life = 0;

					    this.maxLife = Math.random() * 200 + 100;

					  }

					  update() {

					    this.life++;

					    if (this.life > this.maxLife) this.reset();

					    this.progress = this.life / this.maxLife;

					  }

					  draw() {

					    const fade = this.progress < 0.2 ? this.progress / 0.2 : this.progress > 0.8 ? (1 - this.progress) / 0.2 : 1;

					    ctx.save();

					    ctx.globalAlpha = this.maxAlpha * fade;

					    ctx.strokeStyle = this.color;

					    ctx.lineWidth = 0.5;

					    ctx.beginPath();

					    ctx.moveTo(this.x, this.y);

					    const cx = this.x + (this.targetX - this.x) * this.progress;

					    const cy = this.y + (this.targetY - this.y) * this.progress;

					    ctx.lineTo(cx, cy);

					    ctx.stroke();

					    ctx.restore();

					  }

					}



					const particles = Array.from({length: 500}, () => new Particle());

					const lines = Array.from({length: 14}, () => new ConnectionLine());



					function loop() {

					  ctx.clearRect(0, 0, canvas.width, canvas.height);

					  lines.forEach(l => { l.update(); l.draw(); });

					  particles.forEach(p => { p.update(); p.draw(); });

					  requestAnimationFrame(loop);

					}

					loop();

				</script>
